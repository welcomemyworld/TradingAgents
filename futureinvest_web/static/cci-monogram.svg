<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Future Invest monogram</title>
  <desc id="desc">A custom FI monogram built from editorial geometry and orbit lines.</desc>
  <defs>
    <linearGradient id="fi-bg" x1="64" y1="44" x2="454" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#191f23"/>
      <stop offset="100%" stop-color="#0d1113"/>
    </linearGradient>
    <linearGradient id="fi-accent" x1="124" y1="98" x2="386" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0aa6b"/>
      <stop offset="55%" stop-color="#d8c07b"/>
      <stop offset="100%" stop-color="#87c7b0"/>
    </linearGradient>
    <filter id="fi-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#fi-bg)"/>
  <rect x="28" y="28" width="456" height="456" rx="92" fill="none" stroke="#3f3428" stroke-width="2"/>
  <circle cx="286" cy="256" r="152" fill="none" stroke="#514335" stroke-width="2"/>
  <path d="M146 124C104 156 78 204 78 258C78 360 156 440 258 440C315 440 367 416 402 378" fill="none" stroke="url(#fi-accent)" stroke-width="20" stroke-linecap="round" filter="url(#fi-shadow)"/>
  <rect x="202" y="114" width="30" height="286" rx="15" fill="#f5efe5"/>
  <rect x="202" y="114" width="126" height="30" rx="15" fill="#f5efe5"/>
  <rect x="202" y="228" width="98" height="28" rx="14" fill="#f5efe5"/>
  <rect x="300" y="138" width="26" height="236" rx="13" fill="#f0aa6b"/>
  <circle cx="313" cy="124" r="12" fill="#d8c07b"/>
  <circle cx="313" cy="388" r="12" fill="#87c7b0"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Future Invest monogram</title>
  <desc id="desc">A cyberpunk FI monogram built from neon rails, a clipped frame, and a signal orbit.</desc>
  <defs>
    <linearGradient id="fi-bg" x1="42" y1="34" x2="472" y2="486" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#090d1d"/>
      <stop offset="100%" stop-color="#03050d"/>
    </linearGradient>
    <linearGradient id="fi-neon" x1="120" y1="110" x2="388" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff57c5"/>
      <stop offset="55%" stop-color="#8a5cff"/>
      <stop offset="100%" stop-color="#4ef2ff"/>
    </linearGradient>
    <filter id="fi-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#fi-bg)"/>

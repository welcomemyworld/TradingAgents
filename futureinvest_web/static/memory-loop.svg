<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="920" viewBox="0 0 1200 920" role="img" aria-labelledby="title desc">
  <title id="title">Institutional memory loop</title>
  <desc id="desc">A circular diagram showing world model history, thesis history, prediction ledger, and agent reliability feeding an evaluation loop.</desc>
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8c15c"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12273b"/>
      <stop offset="100%" stop-color="#0e2030"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 36px Arial, Helvetica, sans-serif; fill: #f4f8fb; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #a9bdce; }
      .heading { font: 700 24px Arial, Helvetica, sans-serif; fill: #f4f8fb; }
      .body { font: 400 17px Arial, Helvetica, sans-serif; fill: #dbe5ed; }
      .small { font: 400 15px Arial, Helvetica, sans-serif; fill: #a9bdce; }
      .kicker { font: 700 14px Arial, Helvetica, sans-serif; letter-spacing: 2px; fill: #7dd3fc; }
      .card { fill: url(#card); stroke: #40617e; stroke-width: 2; }
      .ring { stroke: url(#ring); stroke-width: 16; fill: none; filter: url(#glow); }
      .guide { stroke: #35536d; stroke-width: 2; fill: none; stroke-dasharray: 8 8; }
      .link { stroke: #557894; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <text x="70" y="84" class="title">Institutional Memory And Evaluation Loop</text>
  <text x="70" y="116" class="subtitle">Future Invest is designed to improve as an institution, not just as a single-run assistant.</text>

  <circle cx="600" cy="488" r="214" class="ring"/>
  <circle cx="600" cy="488" r="282" class="guide"/>

  <rect x="440" y="380" width="320" height="220" rx="28" class="card"/>
  <text x="472" y="418" class="kicker">CORE MEMORY</text>
  <text x="472" y="456" class="heading">Institutional Memory</text>
  <text x="472" y="490" class="body">Persistent company context shared across runs</text>
  <text x="472" y="528" class="small">Feeds orchestration, challenge, sizing, and post-hoc learning</text>

  <rect x="128" y="220" width="250" height="122" rx="24" class="card"/>
  <text x="160" y="258" class="heading">World Model History</text>
  <text x="160" y="293" class="small">What was believed</text>
  <text x="160" y="320" class="small">about the company over time</text>

  <rect x="822" y="220" width="250" height="122" rx="24" class="card"/>
  <text x="854" y="258" class="heading">Thesis History</text>
  <text x="854" y="293" class="small">How the investable case</text>
  <text x="854" y="320" class="small">evolved across runs</text>

  <rect x="128" y="636" width="250" height="122" rx="24" class="card"/>
  <text x="160" y="674" class="heading">Prediction Ledger</text>
  <text x="160" y="709" class="small">Forecast records, realized</text>
  <text x="160" y="736" class="small">outcomes, and error analysis</text>

  <rect x="822" y="636" width="250" height="122" rx="24" class="card"/>
  <text x="854" y="674" class="heading">Agent Reliability</text>
  <text x="854" y="709" class="small">Which engines perform</text>
  <text x="854" y="736" class="small">well in which regimes</text>

  <path d="M378 281 C452 318, 490 350, 520 404" class="link"/>
  <path d="M822 281 C748 318, 710 350, 680 404" class="link"/>
  <path d="M378 697 C452 660, 490 628, 520 574" class="link"/>
  <path d="M822 697 C748 660, 710 628, 680 574" class="link"/>

  <rect x="430" y="692" width="340" height="120" rx="24" class="card"/>
  <text x="462" y="730" class="kicker">EVALUATION LOOP</text>
  <text x="462" y="768" class="heading">Compare, Audit, Refine</text>
  <text x="462" y="798" class="small">Engineering reliability, research quality, institution quality, outcome quality</text>

  <path d="M600 600 V692" class="link"/>
</svg>

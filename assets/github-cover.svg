<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#08111C"/>
  <rect x="24" y="24" width="1552" height="852" rx="32" fill="url(#bg)"/>

  <circle cx="1248" cy="186" r="214" fill="url(#glowA)" opacity="0.34"/>
  <circle cx="1358" cy="654" r="252" fill="url(#glowB)" opacity="0.2"/>
  <circle cx="1174" cy="524" r="112" stroke="#7FD1B9" stroke-opacity="0.22" stroke-width="2"/>
  <circle cx="1174" cy="524" r="172" stroke="#7FD1B9" stroke-opacity="0.14" stroke-width="2"/>
  <circle cx="1174" cy="524" r="236" stroke="#7FD1B9" stroke-opacity="0.08" stroke-width="2"/>

  <text x="92" y="160" fill="#F7F3EA" font-family="Helvetica, Arial, sans-serif" font-size="84" font-weight="700">
    Future Invest
  </text>
  <text x="96" y="224" fill="#E1B96A" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="2">
    INVESTMENT INSTITUTION OPERATING SYSTEM
  </text>

  <text x="92" y="312" fill="#D9E2EF" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="500">
    Turn research into position construction,
  </text>
  <text x="92" y="358" fill="#D9E2EF" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="500">
    kill criteria, and monitoring.
  </text>

  <text x="92" y="430" fill="#8EA3BB" font-family="Helvetica, Arial, sans-serif" font-size="24">
    Not a stock picker. Not a memo generator.
  </text>
  <text x="92" y="466" fill="#8EA3BB" font-family="Helvetica, Arial, sans-serif" font-size="24">
    A lean decision loop for portfolio-aware investing.
  </text>

  <rect x="92" y="536" width="332" height="136" rx="24" fill="#13283D" stroke="#3A6EA5" stroke-width="2"/>
  <text x="124" y="586" fill="#F7F3EA" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">
    Lean Loop
  </text>
  <text x="124" y="622" fill="#B5C6D8" font-family="Helvetica, Arial, sans-serif" font-size="20">
    mandate -> research -> thesis
  </text>
  <text x="124" y="650" fill="#B5C6D8" font-family="Helvetica, Arial, sans-serif" font-size="20">
    vs challenge -> position packet
  </text>

  <rect x="450" y="536" width="332" height="136" rx="24" fill="#162F28" stroke="#4FBF8E" stroke-width="2"/>
  <text x="482" y="586" fill="#F7F3EA" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">
    Position Packet
  </text>
  <text x="482" y="622" fill="#C9EBDD" font-family="Helvetica, Arial, sans-serif" font-size="20">
    stance, size, entry framework,
  </text>
  <text x="482" y="650" fill="#C9EBDD" font-family="Helvetica, Arial, sans-serif" font-size="20">
    kill criteria, monitoring
  </text>

  <rect x="808" y="536" width="332" height="136" rx="24" fill="#34261A" stroke="#E1B96A" stroke-width="2"/>
  <text x="840" y="586" fill="#F7F3EA" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">
    Institutional Memory
  </text>
  <text x="840" y="622" fill="#F2DEB2" font-family="Helvetica, Arial, sans-serif" font-size="20">
    repeatable workflow,
  </text>
  <text x="840" y="650" fill="#F2DEB2" font-family="Helvetica, Arial, sans-serif" font-size="20">
    evaluation, cross-run learning
  </text>

  <rect x="1180" y="512" width="298" height="182" rx="28" fill="#0F1D2C" stroke="#263C57" stroke-width="2"/>
  <text x="1214" y="560" fill="#E8EEF6" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">
    Default Outputs
  </text>
  <text x="1216" y="606" fill="#D2DCE8" font-family="Helvetica, Arial, sans-serif" font-size="19">
    • variant view
  </text>
  <text x="1216" y="640" fill="#D2DCE8" font-family="Helvetica, Arial, sans-serif" font-size="19">
    • portfolio role
  </text>
  <text x="1216" y="674" fill="#D2DCE8" font-family="Helvetica, Arial, sans-serif" font-size="19">
    • position size
  </text>
  <text x="1216" y="708" fill="#D2DCE8" font-family="Helvetica, Arial, sans-serif" font-size="19">
    • kill criteria
  </text>

  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="1526" y2="850" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1624"/>
      <stop offset="1" stop-color="#112033"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1248 186) rotate(90) scale(214)">
      <stop stop-color="#E1B96A"/>
      <stop offset="1" stop-color="#E1B96A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1358 654) rotate(90) scale(252)">
      <stop stop-color="#4FBF8E"/>
      <stop offset="1" stop-color="#4FBF8E" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>

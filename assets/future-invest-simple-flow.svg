  <g>
    <rect x="1018" y="526" width="194" height="106" rx="22" fill="#120B24" stroke="#6A2A6F" stroke-width="2"/>
    <text x="1044" y="560" fill="#FF57C5" font-size="14" font-family="'SFMono-Regular', Consolas, monospace" letter-spacing="2.2">FULL OPTIONAL</text>
    <text x="1044" y="595" fill="#F5F7FF" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Committee</text>
    <text x="1044" y="621" fill="#A7B7D6" font-size="17" font-family="Arial, Helvetica, sans-serif">Deeper execution and sizing</text>

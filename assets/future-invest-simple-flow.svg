    <text x="794" y="292" fill="#67F0FF" font-size="14" font-family="'SFMono-Regular', Consolas, monospace" letter-spacing="2.4">STEP 03</text>
    <text x="794" y="330" fill="#F5F7FF" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Thesis</text>

    <text x="120" y="292" fill="#67F0FF" font-size="14" font-family="'SFMono-Regular', Consolas, monospace" letter-spacing="2.4">STEP 01</text>
    <text x="120" y="330" fill="#F5F7FF" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Mandate</text>
    <text x="120" y="360" fill="#F5F7FF" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">&amp; Context</text>
    <text x="120" y="395" fill="#A7B7D6" font-size="18" font-family="Arial, Helvetica, sans-serif">Portfolio role</text>
    <text x="120" y="420" fill="#A7B7D6" font-size="18" font-family="Arial, Helvetica, sans-serif">Capital and risk budget</text>

    <rect x="1258" y="506" width="238" height="12" rx="6" fill="#67F0FF" opacity="0.85"/>
    <text x="1286" y="548" fill="#67F0FF" font-size="14" font-family="'SFMono-Regular', Consolas, monospace" letter-spacing="2.4">STEP 05</text>
    <text x="1286" y="586" fill="#F5F7FF" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Memory</text>
    <text x="1286" y="616" fill="#F5F7FF" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">&amp; Evaluation</text>
    <text x="1286" y="641" fill="#A7B7D6" font-size="18" font-family="Arial, Helvetica, sans-serif">Trace, outcome, next run</text>

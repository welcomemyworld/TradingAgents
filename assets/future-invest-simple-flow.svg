    <text x="438" y="351" fill="#F5F7FF" font-size="17" font-family="Arial, Helvetica, sans-serif">Business Truth</text>
    <rect x="416" y="374" width="274" height="34" rx="17" fill="#0D1730" stroke="#1F335F"/>
    <text x="438" y="397" fill="#F5F7FF" font-size="17" font-family="Arial, Helvetica, sans-serif">Market Expectations</text>

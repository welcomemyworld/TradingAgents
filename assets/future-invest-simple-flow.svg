    <rect x="1062" y="220" width="330" height="12" rx="6" fill="#FF57C5" opacity="0.9"/>
    <text x="1090" y="262" fill="#FF57C5" font-size="14" font-family="'SFMono-Regular', Consolas, monospace" letter-spacing="2.4">STEP 04 / LEAN DEFAULT</text>
    <text x="1090" y="302" fill="#F5F7FF" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Position Packet</text>
    <text x="1090" y="340" fill="#A7B7D6" font-size="18" font-family="Arial, Helvetica, sans-serif">Stance, size, entry, kill criteria,</text>
    <text x="1090" y="365" fill="#A7B7D6" font-size="18" font-family="Arial, Helvetica, sans-serif">monitoring, missing evidence.</text>
    <rect x="1090" y="392" width="104" height="32" rx="16" fill="#231030" stroke="#6A2A6F"/>
    <text x="1115" y="413" fill="#FF8BDA" font-size="15" font-family="'SFMono-Regular', Consolas, monospace">LEAN</text>

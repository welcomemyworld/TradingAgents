  <g fill="#67F0FF">
    <circle cx="388" cy="335" r="6"/>
    <circle cx="766" cy="335" r="6"/>
    <circle cx="1062" cy="335" r="6"/>
    <circle cx="1377" cy="506" r="6"/>
  </g>
  <g fill="#FF57C5">
    <circle cx="1115" cy="526" r="6"/>
  </g>

  <text x="1046" y="500" fill="#FF8BDA" font-size="15" font-family="'SFMono-Regular', Consolas, monospace" letter-spacing="1.4">expand only when the seat justifies it</text>

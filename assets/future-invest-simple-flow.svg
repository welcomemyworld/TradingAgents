  <g stroke="url(#edge)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M340 335H388"/>
    <path d="M718 335H766"/>
    <path d="M1014 335H1062"/>
    <path d="M1392 450V480H1377V506"/>

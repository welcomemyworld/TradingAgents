    <text x="794" y="397" fill="#A7B7D6" font-size="18" font-family="Arial, Helvetica, sans-serif">Bull case and counterevidence</text>
    <text x="794" y="422" fill="#A7B7D6" font-size="18" font-family="Arial, Helvetica, sans-serif">forced into one view</text>
  </g>


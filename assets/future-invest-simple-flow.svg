  <text x="96" y="96" fill="#67F0FF" font-size="16" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace" letter-spacing="3.2">FUTURE INVEST / SIMPLE WORKFLOW</text>
  <text x="96" y="138" fill="#F5F7FF" font-size="40" font-family="Arial, Helvetica, sans-serif" font-weight="700">One lean investment loop. One optional committee branch.</text>
  <text x="96" y="173" fill="#A7B7D6" font-size="20" font-family="Arial, Helvetica, sans-serif">Replace five busy diagrams with one readable map of how research becomes an investable position.</text>


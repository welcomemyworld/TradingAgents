<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" fill="none">
  <defs>
    <linearGradient id="bg" x1="90" y1="80" x2="1510" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060816"/>
      <stop offset="1" stop-color="#0C1530"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F1C3F" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#081021" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#67F0FF"/>
      <stop offset="1" stop-color="#FF57C5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="760" rx="28" fill="url(#bg)"/>
  <g opacity="0.2">
    <path d="M80 128H1520" stroke="#203056" stroke-width="1"/>
    <path d="M80 380H1520" stroke="#203056" stroke-width="1"/>
    <path d="M80 632H1520" stroke="#203056" stroke-width="1"/>
    <path d="M260 70V690" stroke="#203056" stroke-width="1"/>
    <path d="M620 70V690" stroke="#203056" stroke-width="1"/>
    <path d="M980 70V690" stroke="#203056" stroke-width="1"/>
